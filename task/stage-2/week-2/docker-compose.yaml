version: "3.8"

services:
  webserver:
    image: nginx:alpine
    container_name: webserver_staging
    ports:
      - "81:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - eep_network

  frontend:
    build:
      context: ./wayshub-frontend
      dockerfile: Dockerfile
    container_name: wayshub-frontend_staging
    networks:
      - eep_network

  backend:
    build:
      context: ./wayshub-backend
      dockerfile: Dockerfile
    container_name: wayshub-backend_staging
    restart: always
    environment:
      NODE_ENV: staging
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: wayshub
    depends_on:
      - database
    networks:
      - eep_network

  migration:
    build:
      context: ./wayshub-backend
      dockerfile: Dockerfile
    container_name: migration_staging
    command: >
      sh -c "npx sequelize db:migrate && npx sequelize db:seed:all"
    environment:
      NODE_ENV: staging
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: wayshub
    depends_on:
      - database
    networks:
      - eep_network

  database:
    image: mysql:8
    container_name: db_staging
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wayshub
    volumes:
      - db_staging:/var/lib/mysql
    networks:
      - eep_network

volumes:
  db_staging:

networks:
  eep_network:
    driver: bridge